<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Planning Familial</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <!-- Filtre SVG aquarelle appliqué aux images de recettes -->
    <svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
      <defs>
        <filter id="aquarelle" x="-3%" y="-3%" width="106%" height="106%" color-interpolation-filters="sRGB">
          <!-- Grain de papier aquarelle -->
          <feTurbulence type="fractalNoise" baseFrequency="0.65 0.75" numOctaves="3" seed="4" result="grain"/>
          <feColorMatrix type="saturate" values="0" in="grain" result="grayGrain"/>
          <!-- Déformation peinture (bords flous, coulures) -->
          <feTurbulence type="turbulence" baseFrequency="0.012 0.018" numOctaves="2" seed="7" result="warp"/>
          <feDisplacementMap in="SourceGraphic" in2="warp" scale="7" xChannelSelector="R" yChannelSelector="G" result="painted"/>
          <!-- Flou doux aquarelle -->
          <feGaussianBlur in="painted" stdDeviation="0.7" result="blurred"/>
          <!-- Superposition grain papier -->
          <feBlend in="blurred" in2="grayGrain" mode="soft-light" result="textured"/>
          <!-- Recadrer au contour original -->
          <feComposite in="textured" in2="SourceGraphic" operator="in"/>
        </filter>
      </defs>
    </svg>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
