name: Mise à jour des activités — Québec

on:
  schedule:
    # Chaque dimanche à midi HNDE (16:00 UTC)
    - cron: '0 16 * * 0'
  workflow_dispatch:
    # Permettre le déclenchement manuel depuis GitHub

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Fetcher les événements et suggestions IA
        env:
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/fetch-activites.mjs

      - name: Vérifier s'il y a des changements
        id: check
        run: |
          git diff --quiet src/data/activites.json src/data/meta.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit et push si changements
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/activites.json src/data/meta.json
          git commit -m "🗓 Activités Québec — semaine du $(date '+%d %b %Y')"
          git push

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main  # Prendre le commit mis à jour

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - uses: actions/deploy-pages@v4
        id: deployment
