name: Préparation semaine — vendredi soir

on:
  schedule:
    # Vendredi 23h heure de Québec (samedi matin UTC)
    # Heure d'été  (UTC-4) : vendredi 23h = samedi 03h UTC
    # Heure d'hiver (UTC-5) : vendredi 23h = samedi 04h UTC
    - cron: '0 3 * * 6'   # Heure d'été  (avril → octobre)
    - cron: '0 4 * * 6'   # Heure d'hiver (novembre → mars)
  workflow_dispatch:      # Déclenchement manuel depuis GitHub si besoin

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Activités & événements (Ticketmaster + IA)
        env:
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/fetch-activites.mjs

      - name: Circulaires & aubaines (Maxi, Costco, Lufa)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/fetch-aubaines.mjs

      # ── Prochains scripts à ajouter ici ─────────────────────────────────────
      # - name: Recommandations épicerie
      #   run: node scripts/generer-liste-epicerie.mjs

      - name: Vérifier s'il y a des changements
        id: check
        run: |
          git diff --quiet || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit et push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "🌙 Préparation semaine du $(TZ='America/Toronto' date '+%d %b %Y' -d 'next monday')"
          git pull --rebase origin main
          git push

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - uses: actions/deploy-pages@v4
        id: deployment
